# Archivo de ejemplo de configuración para experimentos de hemodinámica (Arteria LAD)

artery_params:
  radius_in: 1.6 # [mm] Radio proximal
  radius_out: 1.1 # [mm] Radio distal (conexión árbol)
  length: 80 # [mm] Longitud segmento

tree_params:
  tree_volume: 70 # [mL] Volumen territorio perfundido
  n_terminal: 2000 # [-] Nodos terminales
  murray_exponent: 3.0 # [-] Exponente bifurcaciones
  mu: 0.0035 # [g/(mm·s)] Usado por VascuSynth
  rho: 0.00106 # [g/mm³]   Usado por VascuSynth

simulation_params:
  solver: "stabilized_schur_lsc"
  T: 0.1 # [s] Tiempo final
  dt: 0.01 # [s] Paso temporal
  mu: 0.0035 # [g/(mm·s)] Viscosidad dinámica (solver CFD)
  rho: 0.00106 # [g/mm³]   Densidad sangre (solver CFD)
  q_in: 70 # [mL/min] Flujo reposo — prescribe velocidad inlet BC
  q_in_hyper: 225 # [mL/min] Flujo hiperemia
  p_terminal: 1000 # [Pa] Presión de salida BC
  geometry_type: "full"
  hyperemia: false
  bc_type:
    inlet: "velocity_parabolic"
    outlet: "pressure"

# Matriz paramétrica: producto cartesiano → un subexperimento por combinación
matrix:
  hyperemia: [true, false] # Estado fisiológico
  vessel_loss_factor: [0.0, 0.5] # Rarefacción microvascular
  stenosis_severity: [0.0, 0.1, 0.2] # Severidad estenosis
  hyperemia_dilation_factor: [1.0] # Vasodilatación árbol en hiperemia
