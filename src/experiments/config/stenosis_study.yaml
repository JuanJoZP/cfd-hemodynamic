artery_params:
  radius_in: 1.5 # [mm]
  radius_out: 0.65 # [mm]
  length: 80 # [mm]
  coupling_slope: 0.05 # [-]
  stenosis_slope: 0.3 # [-]

tree_params:
  perf_pressure: 133000 # [dyn/cm²]
  term_pressure: 80000 # [dyn/cm²]
  tree_volume: 40 # [mL]
  n_terminal: 10 # [-]
  murray_exponent: 3.0 # [-]
  mu: 0.0035 # [g/(mm·s)] Used by VascuSynth
  rho: 0.00106 # [g/mm³]   Used by VascuSynth

simulation_params:
  solver: "stabilized_schur"
  T: 0.1
  dt: 0.01
  mu: 0.0035
  rho: 0.00106
  q_in: 2
  q_in_hyper: 225
  geometry_type: "full"
  hyperemia: false
  bc_type:
    inlet: "velocity_parabolic"
    outlet: "pressure"

matrix:
  stenosis_position: [0.25, 0.5, 0.75]
  stenosis_severity: [0.25, 0.5, 0.75]
